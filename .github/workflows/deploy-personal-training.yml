name: Deploy Personal Training

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'sites/personal-training/**'
      - '.github/workflows/deploy-personal-training.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:personal-training
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-1
      - run: |
          aws s3 sync sites/personal-training/dist s3://${{ secrets.PERSONAL_TRAINING_SITE_BUCKET }} --delete
          aws cloudfront create-invalidation --distribution-id ${{ secrets.PERSONAL_TRAINING_CLOUDFRONT_DISTRIBUTION_ID }} --paths '/*'
